<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>セグロット在庫</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; background:#e9e4d8; font-family:'Zen Kaku Gothic New',sans-serif; color:#1c2321; }
  input, select, button { font-family: inherit; font-size: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const C = { paper:"#f4f1ea", ink:"#1c2321", line:"#d8d2c4", accent:"#1f5c4d", alert:"#b4451f", gold:"#9a7b3f", inBg:"#eef3f1", outBg:"#fbeef0" };

function api(path, opts={}) {
  return fetch(path, { credentials:"same-origin", headers:{"Content-Type":"application/json"}, ...opts })
    .then(async r => { if(!r.ok){ const e=await r.json().catch(()=>({detail:r.statusText})); throw new Error(e.detail||"エラー"); } return r.json(); });
}

function Login({ onLogin }) {
  const [user,setUser]=useState(""); const [pw,setPw]=useState(""); const [err,setErr]=useState("");
  const submit = () => {
    const fd = new URLSearchParams(); fd.append("user",user); fd.append("password",pw);
    fetch("/api/login",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:fd})
      .then(async r=>{ if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"ログイン失敗");} return r.json();})
      .then(onLogin).catch(e=>setErr(e.message));
  };
  return (
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <div style={S.brand}>FELICROSS</div>
        <h1 style={S.loginTitle}>セグロット在庫</h1>
        <input style={S.input} placeholder="ユーザー名" value={user} onChange={e=>setUser(e.target.value)} />
        <input style={S.input} type="password" placeholder="パスワード" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&submit()} />
        {err && <div style={S.err}>{err}</div>}
        <button style={S.primaryBtn} onClick={submit}>ログイン</button>
      </div>
    </div>
  );
}

function Scanner({ onDetect, onClose }) {
  const videoRef = React.useRef(null);
  const [err,setErr]=useState("");
  useEffect(()=>{
    let reader;
    if(!window.ZXing){ setErr("読み取りライブラリを読み込めませんでした"); return; }
    try {
      reader = new window.ZXing.BrowserMultiFormatReader();
      reader.decodeFromVideoDevice(null, videoRef.current, (result, e) => {
        if(result){ onDetect(result.getText()); }
      });
    } catch(e){ setErr("カメラを起動できません（HTTPS接続が必要です）"); }
    return ()=>{ try{ reader && reader.reset(); }catch(e){} };
  },[]);
  return (
    <div style={S.scanOverlay}>
      <div style={S.scanBox}>
        <div style={S.scanHead}>バーコードをかざしてください<button style={S.scanClose} onClick={onClose}>閉じる</button></div>
        <video ref={videoRef} style={S.scanVideo} muted playsInline />
        {err && <div style={S.err}>{err}</div>}
        <div style={S.scanHint}>商品のJANコードを枠内に映すと自動で読み取ります</div>
      </div>
    </div>
  );
}

function InputView({ me }) {
  const [products,setProducts]=useState([]);
  const [code,setCode]=useState(""); const [kind,setKind]=useState("out");
  const [unit,setUnit]=useState("carton"); const [value,setValue]=useState("");
  const [msg,setMsg]=useState(null); const [q,setQ]=useState("");
  const [recent,setRecent]=useState([]);
  const [scanning,setScanning]=useState(false);
  const [janPick,setJanPick]=useState(null);

  const load = () => { api("/api/products").then(d=>setProducts(d.items)); api("/api/movements").then(d=>setRecent(d.items)); };
  useEffect(load,[]);

  const onDetect = (jan) => {
    setScanning(false);
    setJanPick(null);
    api(`/api/lookup?jan=${encodeURIComponent(jan)}`)
      .then(d=>{
        const items = d.items;
        if(items.length===1){ setCode(items[0].code); setQ(""); setMsg({t:`読取：${items[0].name}`,e:false}); }
        else { setJanPick(items); setMsg({t:`同じJANの商品が${items.length}件あります。ロットを選んでください`,e:false}); }
      })
      .catch(e=>setMsg({t:`JAN ${jan}：${e.message}`,e:true}));
  };

  const pickJan = (p) => { setCode(p.code); setQ(""); setJanPick(null); setMsg({t:`選択：${p.name}（${p.code}）`,e:false}); };

  const filtered = useMemo(()=> products.filter(p=> !q || p.name.includes(q) || p.code.includes(q)), [products,q]);
  const sel = products.find(p=>p.code===code);
  const previewPcs = sel && value ? (unit==="carton" ? Number(value)*sel.units_per_carton : Number(value)) : null;

  const submit = () => {
    if(!code){ setMsg({t:"商品を選んでください",e:true}); return; }
    if(!value || Number(value)<=0){ setMsg({t:"数量を入力してください",e:true}); return; }
    api("/api/movement",{method:"POST",body:JSON.stringify({code,kind,unit,value:Number(value)})})
      .then(r=>{ setMsg({t:`登録しました：${kind==="in"?"入荷":"出荷"} ${r.qty}個`,e:false}); setValue(""); load(); })
      .catch(e=>setMsg({t:e.message,e:true}));
  };

  return (
    <div style={S.page}>
      {scanning && <Scanner onDetect={onDetect} onClose={()=>setScanning(false)} />}
      <Header me={me} title="入出庫の入力" />
      <div style={S.card}>
        <button style={S.scanBtn} onClick={()=>setScanning(true)}>📷 バーコードで商品を読み取る</button>
        <label style={S.label}>または商品を検索</label>
        <input style={S.input} placeholder="商品名・コードで絞り込み" value={q} onChange={e=>setQ(e.target.value)} />
        <select style={S.select} value={code} onChange={e=>setCode(e.target.value)} size="1">
          <option value="">— 商品を選択 —</option>
          {filtered.map(p=> <option key={p.code} value={p.code}>{p.name}（{p.code}）入数{p.units_per_carton}</option>)}
        </select>
        {sel && <div style={S.selBox}>選択中：<b>{sel.name}</b>（{sel.code}）{sel.jan?`／JAN ${sel.jan}`:"／JANなし"}</div>}
        {janPick && (
          <div style={S.janPickBox}>
            <div style={S.janPickTitle}>同じJANの商品（ロット）が複数あります。選んでください：</div>
            {janPick.map(p=>(
              <button key={p.code} style={S.janPickBtn} onClick={()=>pickJan(p)}>{p.name}（{p.code}）</button>
            ))}
          </div>
        )}

        <div style={S.row}>
          <button style={kind==="in"?{...S.toggle,...S.toggleInActive}:S.toggle} onClick={()=>setKind("in")}>入荷</button>
          <button style={kind==="out"?{...S.toggle,...S.toggleOutActive}:S.toggle} onClick={()=>setKind("out")}>出荷</button>
        </div>

        <div style={S.row}>
          <button style={unit==="carton"?{...S.toggle,...S.unitActive}:S.toggle} onClick={()=>setUnit("carton")}>カートン</button>
          <button style={unit==="pcs"?{...S.toggle,...S.unitActive}:S.toggle} onClick={()=>setUnit("pcs")}>個数</button>
        </div>

        <label style={S.label}>{unit==="carton"?"カートン数":"個数"}</label>
        <input style={S.input} type="number" inputMode="numeric" min="1" value={value} onChange={e=>setValue(e.target.value)} placeholder="数量" />
        {previewPcs!=null && <div style={S.preview}>= {previewPcs.toLocaleString()} 個 として記録されます{sel&&unit==="carton"?`（${sel.units_per_carton}個 × ${value}）`:""}</div>}

        {msg && <div style={msg.e?S.err:S.ok}>{msg.t}</div>}
        <button style={S.primaryBtn} onClick={submit}>登録する</button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>最近の登録</div>
        {recent.length===0 && <div style={S.muted}>まだありません</div>}
        {recent.slice(0,8).map(m=>(
          <div key={m.id} style={S.recentRow}>
            <span style={{...S.badge, background:m.kind==="in"?C.inBg:C.outBg, color:m.kind==="in"?C.accent:C.alert}}>{m.kind==="in"?"入荷":"出荷"}</span>
            <span style={S.recentName}>{m.name}</span>
            <span style={S.recentQty}>{m.qty}個</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FbaShipmentView({ me }) {
  const [products,setProducts]=useState([]);
  const [boxes,setBoxes]=useState([{length_cm:"",width_cm:"",height_cm:"",weight_kg:"",items:[{code:"",qty:""}]}]);
  const [carrier,setCarrier]=useState(""); const [note,setNote]=useState("");
  const [msg,setMsg]=useState(null); const [history,setHistory]=useState([]);
  const [trackInput,setTrackInput]=useState({});

  const load = () => {
    api("/api/products").then(d=>setProducts(d.items));
    api("/api/fba-shipment").then(d=>setHistory(d.items));
  };
  useEffect(load,[]);

  const setBoxField = (bi,key,val) => setBoxes(arr=>arr.map((b,idx)=>idx===bi?{...b,[key]:val}:b));
  const addBoxRow = () => setBoxes(arr=>[...arr,{length_cm:"",width_cm:"",height_cm:"",weight_kg:"",items:[{code:"",qty:""}]}]);
  const removeBoxRow = (bi) => setBoxes(arr=>arr.filter((_,idx)=>idx!==bi));

  const setBoxItem = (bi,ii,key,val) => setBoxes(arr=>arr.map((b,idx)=>idx!==bi?b:{...b,items:b.items.map((it,iidx)=>iidx===ii?{...it,[key]:val}:it)}));
  const addBoxItemRow = (bi) => setBoxes(arr=>arr.map((b,idx)=>idx!==bi?b:{...b,items:[...b.items,{code:"",qty:""}]}));
  const removeBoxItemRow = (bi,ii) => setBoxes(arr=>arr.map((b,idx)=>idx!==bi?b:{...b,items:b.items.filter((_,iidx)=>iidx!==ii)}));

  const submit = () => {
    let anySelected=false, missingQty=false;
    boxes.forEach(b=>b.items.forEach(it=>{ if(it.code){ anySelected=true; if(!it.qty||Number(it.qty)<=0) missingQty=true; } }));
    if(!anySelected){ setMsg({e:true,t:"箱に商品を1件以上選んでください"}); return; }
    if(missingQty){ setMsg({e:true,t:"個数を入力してください（商品を選んだ行すべてに必要です）"}); return; }
    const cleanBoxes = boxes.map(b=>({
      length_cm: b.length_cm?Number(b.length_cm):null, width_cm: b.width_cm?Number(b.width_cm):null,
      height_cm: b.height_cm?Number(b.height_cm):null, weight_kg: b.weight_kg?Number(b.weight_kg):null,
      items: b.items.filter(it=>it.code).map(it=>({code:it.code, qty:Number(it.qty)})),
    }));
    api("/api/fba-shipment",{method:"POST",body:JSON.stringify({boxes:cleanBoxes,carrier,note})})
      .then(r=>{ setMsg({e:false,t:`報告を登録しました（発送ID: ${r.shipment_id} / 箱${r.box_count}個）`});
        setBoxes([{length_cm:"",width_cm:"",height_cm:"",weight_kg:"",items:[{code:"",qty:""}]}]);
        setCarrier(""); setNote(""); load(); })
      .catch(e=>setMsg({e:true,t:e.message}));
  };

  const submitTracking = (shipmentId, boxNo) => {
    const key = `${shipmentId}-${boxNo}`;
    const val = trackInput[key];
    if(!val) return;
    api("/api/fba-shipment/tracking",{method:"POST",body:JSON.stringify({shipment_id:shipmentId,box_no:boxNo,tracking_number:val})})
      .then(load);
  };

  return (
    <div style={S.page}>
      <Header me={me} title="FBA発送報告" />
      <div style={S.notice2}>
        Amazonへの登録はまだ行われません（認証情報の設定待ち）。ここでは発送内容・箱の情報を記録します。
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>箱ごとの内容（サイズ・重量・商品）</div>
        <div style={S.muted}>1つの箱に複数の商品（別SKU）を混載できます。箱ごとに商品と個数を入力してください。</div>
        {boxes.map((b,bi)=>(
          <div key={bi} style={S.boxBlock}>
            <div style={S.boxBlockHead}>
              箱{bi+1}
              {boxes.length>1 && <button style={S.removeBtn} onClick={()=>removeBoxRow(bi)}>×</button>}
            </div>
            <div style={S.boxRow}>
              <input style={S.inputXs} type="number" placeholder="縦cm" value={b.length_cm} onChange={e=>setBoxField(bi,"length_cm",e.target.value)} />
              <input style={S.inputXs} type="number" placeholder="横cm" value={b.width_cm} onChange={e=>setBoxField(bi,"width_cm",e.target.value)} />
              <input style={S.inputXs} type="number" placeholder="高cm" value={b.height_cm} onChange={e=>setBoxField(bi,"height_cm",e.target.value)} />
              <input style={S.inputXs} type="number" placeholder="重量kg" value={b.weight_kg} onChange={e=>setBoxField(bi,"weight_kg",e.target.value)} />
            </div>
            <div style={S.boxItemsLabel}>この箱に入れる商品</div>
            {b.items.map((it,ii)=>(
              <div key={ii} style={S.itemRow}>
                <select style={S.selectSm} value={it.code} onChange={e=>setBoxItem(bi,ii,"code",e.target.value)}>
                  <option value="">— 商品を選択 —</option>
                  {products.map(p=><option key={p.code} value={p.code}>{p.name}（{p.code}）</option>)}
                </select>
                <input style={S.inputSm} type="number" min="1" placeholder="個数" value={it.qty}
                  onChange={e=>setBoxItem(bi,ii,"qty",e.target.value)} />
                {b.items.length>1 && <button style={S.removeBtn} onClick={()=>removeBoxItemRow(bi,ii)}>×</button>}
              </div>
            ))}
            <button style={S.addRowBtn} onClick={()=>addBoxItemRow(bi)}>＋ この箱に商品を追加</button>
          </div>
        ))}
        <button style={S.addRowBtn} onClick={addBoxRow}>＋ 箱を追加</button>
      </div>

      <div style={S.card}>
        <label style={S.label}>配送業者（自社便で送る場合）</label>
        <input style={S.input} value={carrier} onChange={e=>setCarrier(e.target.value)} placeholder="例: 佐川急便" />
        <label style={S.label}>備考</label>
        <input style={S.input} value={note} onChange={e=>setNote(e.target.value)} placeholder="任意" />
        {msg && <div style={msg.e?S.err:S.ok}>{msg.t}</div>}
        <button style={S.primaryBtn} onClick={submit}>発送報告を登録する</button>
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>これまでの発送報告</div>
        {history.length===0 && <div style={S.muted}>まだありません</div>}
        {history.map(s=>(
          <div key={s.id} style={S.shipCard}>
            <div style={S.shipHead}>発送ID {s.id} ／ {new Date(s.created_at).toLocaleString("ja-JP")} ／ {s.carrier||"配送業者未記入"}</div>
            {s.items.length>0 && s.items.map((it,i)=>(<div key={i} style={S.shipItem}>・{it.name}（{it.code}） {it.cartons}カートン / {it.qty}個</div>))}
            {s.boxes.map((b,i)=>{
              const key = `${s.id}-${b.box_no}`;
              return (
                <div key={i} style={S.boxTrackBlock}>
                  <div style={S.boxTrackLabel}>箱{b.box_no}: {b.length_cm||"—"}×{b.width_cm||"—"}×{b.height_cm||"—"}cm / {b.weight_kg||"—"}kg</div>
                  {(b.items||[]).map((it,ii)=>(<div key={ii} style={S.shipItem}>　・{it.name}（{it.code}） {it.qty}個</div>))}
                  {b.tracking_number ? (
                    <span style={S.trackDone}>追跡番号: {b.tracking_number}</span>
                  ) : (
                    <span style={S.trackInputRow}>
                      <input style={S.inputXs} placeholder="追跡番号を入力"
                        value={trackInput[key]||""} onChange={e=>setTrackInput(t=>({...t,[key]:e.target.value}))} />
                      <button style={S.trackBtn} onClick={()=>submitTracking(s.id,b.box_no)}>報告</button>
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function StockView({ me }) {
  const [items,setItems]=useState([]); const [q,setQ]=useState("");
  useEffect(()=>{ api("/api/stock").then(d=>setItems(d.items)); },[]);
  const filtered = useMemo(()=> items.filter(p=> !q || p.name.includes(q) || p.code.includes(q)), [items,q]);
  const moved = filtered.filter(p=>p.today_in||p.today_out);

  return (
    <div style={S.page}>
      <Header me={me} title="在庫の確認" />
      <div style={S.card}>
        <div style={S.cardTitle}>本日動きのあった商品（{moved.length}）</div>
        {moved.length===0 && <div style={S.muted}>本日の入出庫はまだありません</div>}
        {moved.map(p=>(
          <div key={p.code} style={S.stockRow}>
            <div style={S.stockName}>{p.name}<div style={S.stockCode}>{p.code}</div></div>
            <div style={S.stockNums}>
              {p.today_in>0 && <span style={{color:C.accent}}>+{p.today_in}</span>}
              {p.today_out>0 && <span style={{color:C.alert}}>−{p.today_out}</span>}
              <span style={S.stockNow}>在庫 {p.stock.toLocaleString()}</span>
            </div>
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={S.stockHeadRow}>
          <div style={S.cardTitle}>全商品の在庫</div>
          <a style={S.exportBtn} href="/api/stock/export">📥 Excelでダウンロード</a>
        </div>
        <input style={S.input} placeholder="商品名・コードで絞り込み" value={q} onChange={e=>setQ(e.target.value)} />
        {filtered.map(p=>(
          <div key={p.code} style={S.stockRow}>
            <div style={S.stockName}>{p.name}<div style={S.stockCode}>{p.code} ・ 入数{p.units_per_carton}</div></div>
            <div style={S.stockNow}>{p.stock.toLocaleString()}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HistoryView({ me }) {
  const [items,setItems]=useState([]); const [products,setProducts]=useState([]);
  const [code,setCode]=useState(""); const [kind,setKind]=useState("");
  const [dateFrom,setDateFrom]=useState(""); const [dateTo,setDateTo]=useState("");
  const [loading,setLoading]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [includeAdjust,setIncludeAdjust]=useState(false);
  const canEdit = me.role==="writer" || me.role==="admin";

  useEffect(()=>{ api("/api/products").then(d=>setProducts(d.items)); },[]);

  const load = () => {
    setLoading(true);
    const params = new URLSearchParams({ limit:"200" });
    if(code) params.set("code",code);
    if(kind) params.set("kind",kind);
    if(dateFrom) params.set("date_from",dateFrom);
    if(dateTo) params.set("date_to",dateTo);
    if(includeAdjust) params.set("include_adjust","true");
    api(`/api/movements?${params.toString()}`).then(d=>setItems(d.items)).finally(()=>setLoading(false));
  };
  useEffect(load, [includeAdjust]);

  const startEdit = (m) => { setEditingId(m.id); setEditForm({ kind:m.kind, unit:m.input_unit, value:m.input_value, note:m.note||"" }); };
  const cancelEdit = () => { setEditingId(null); setEditForm({}); };
  const saveEdit = (id) => {
    if(!editForm.value || Number(editForm.value)<=0){ alert("数量を入力してください"); return; }
    api(`/api/movement/${id}`,{method:"PUT",body:JSON.stringify({
      kind:editForm.kind, unit:editForm.unit, value:Number(editForm.value), note:editForm.note||null,
    })}).then(()=>{ cancelEdit(); load(); }).catch(e=>alert(e.message));
  };
  const removeMovement = (id) => {
    if(!window.confirm("この履歴を削除します。よろしいですか？（在庫数もこの分だけ戻ります）")) return;
    api(`/api/movement/${id}`,{method:"DELETE"}).then(load).catch(e=>alert(e.message));
  };

  return (
    <div style={S.page}>
      <Header me={me} title="入出庫履歴" />
      <div style={S.card}>
        <label style={S.label}>商品で絞り込み</label>
        <select style={S.select} value={code} onChange={e=>setCode(e.target.value)}>
          <option value="">— すべての商品 —</option>
          {products.map(p=><option key={p.code} value={p.code}>{p.name}（{p.code}）</option>)}
        </select>
        <div style={S.row}>
          <button style={kind===""?{...S.toggle,...S.unitActive}:S.toggle} onClick={()=>setKind("")}>すべて</button>
          <button style={kind==="in"?{...S.toggle,...S.toggleInActive}:S.toggle} onClick={()=>setKind("in")}>入荷のみ</button>
          <button style={kind==="out"?{...S.toggle,...S.toggleOutActive}:S.toggle} onClick={()=>setKind("out")}>出荷のみ</button>
        </div>
        <label style={S.label}>期間（任意）</label>
        <div style={S.row}>
          <input style={S.input} type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} />
          <input style={S.input} type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} />
        </div>
        <label style={S.checkboxRow}>
          <input type="checkbox" checked={includeAdjust} onChange={e=>setIncludeAdjust(e.target.checked)} />
          棚卸・初期登録などの在庫調整分も表示する
        </label>
        <button style={S.primaryBtn} onClick={load}>{loading?"検索中…":"絞り込む"}</button>
      </div>
      <div style={S.card}>
        <div style={S.cardTitle}>履歴（{items.length}件・最新200件まで）</div>
        {items.length===0 && <div style={S.muted}>該当する履歴がありません</div>}
        {items.map(m=>(
          <div key={m.id} style={{...S.recentRow, flexWrap:"wrap"}}>
            {editingId===m.id ? (
              <div style={{width:"100%"}}>
                <div style={S.row}>
                  <button style={editForm.kind==="in"?{...S.toggle,...S.toggleInActive}:S.toggle} onClick={()=>setEditForm(f=>({...f,kind:"in"}))}>入荷</button>
                  <button style={editForm.kind==="out"?{...S.toggle,...S.toggleOutActive}:S.toggle} onClick={()=>setEditForm(f=>({...f,kind:"out"}))}>出荷</button>
                </div>
                <div style={S.row}>
                  <button style={editForm.unit==="carton"?{...S.toggle,...S.unitActive}:S.toggle} onClick={()=>setEditForm(f=>({...f,unit:"carton"}))}>カートン</button>
                  <button style={editForm.unit==="pcs"?{...S.toggle,...S.unitActive}:S.toggle} onClick={()=>setEditForm(f=>({...f,unit:"pcs"}))}>個数</button>
                </div>
                <input style={S.input} type="number" min="1" value={editForm.value} onChange={e=>setEditForm(f=>({...f,value:e.target.value}))} placeholder="数量" />
                <input style={S.input} value={editForm.note} onChange={e=>setEditForm(f=>({...f,note:e.target.value}))} placeholder="備考（任意）" />
                <div style={S.row}>
                  <button style={S.primaryBtn} onClick={()=>saveEdit(m.id)}>保存</button>
                  <button style={S.toggle} onClick={cancelEdit}>キャンセル</button>
                </div>
              </div>
            ) : (
              <>
                <span style={{...S.badge, background:m.kind==="in"?C.inBg:C.outBg, color:m.kind==="in"?C.accent:C.alert}}>{m.kind==="in"?"入荷":"出荷"}</span>
                <span style={S.recentName}>{m.name}</span>
                <span style={S.recentQty}>{m.qty}個</span>
                <div style={{width:"100%", fontSize:11, color:"#8a8576", display:"flex", justifyContent:"space-between"}}>
                  <span>{m.move_date}{m.input_unit==="carton"?`（${m.input_value}カートン入力）`:""}{m.note?` ・ ${m.note}`:""}</span>
                  <span>{m.created_by||"—"}</span>
                </div>
                {canEdit && (
                  <div style={{width:"100%", display:"flex", gap:8, justifyContent:"flex-end", marginTop:4}}>
                    <button style={S.editBtn} onClick={()=>startEdit(m)}>修正</button>
                    <button style={S.removeBtn2} onClick={()=>removeMovement(m.id)}>削除</button>
                  </div>
                )}
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function ProductAddView({ me }) {
  const [code,setCode]=useState(""); const [name,setName]=useState("");
  const [upc,setUpc]=useState(""); const [jan,setJan]=useState(""); const [opening,setOpening]=useState("");
  const [moq,setMoq]=useState("");
  const [msg,setMsg]=useState(null); const [added,setAdded]=useState([]);

  const submit = () => {
    if(!code.trim()||!name.trim()){ setMsg({t:"商品コードと商品名は必須です",e:true}); return; }
    api("/api/product",{method:"POST",body:JSON.stringify({
      code:code.trim(), name:name.trim(),
      units_per_carton: Number(upc)||1, jan: jan.trim()||null, opening: Number(opening)||0,
      moq: Number(moq)||0,
    })})
      .then(r=>{ setMsg({t:`登録しました：${r.name}（${r.code}）`,e:false});
        setAdded(a=>[{code:r.code,name:r.name},...a]);
        setCode("");setName("");setUpc("");setJan("");setOpening("");setMoq(""); })
      .catch(e=>setMsg({t:e.message,e:true}));
  };

  return (
    <div style={S.page}>
      <Header me={me} title="商品の追加（管理者）" />
      <div style={S.card}>
        <div style={S.muted}>新しい商品をマスタに登録します。商品コードとJANはNextengineで採番したものを入力してください。</div>
        <label style={S.label}>商品コード（必須）</label>
        <input style={S.input} value={code} onChange={e=>setCode(e.target.value)} placeholder="例: FTC07w" />
        <label style={S.label}>商品名（必須）</label>
        <input style={S.input} value={name} onChange={e=>setName(e.target.value)} placeholder="例: ピントキッズ ◯◯" />
        <label style={S.label}>入数（1カートンあたり個数）</label>
        <input style={S.input} type="number" inputMode="numeric" min="1" value={upc} onChange={e=>setUpc(e.target.value)} placeholder="例: 40" />
        <label style={S.label}>JANコード（任意・13桁）</label>
        <input style={S.input} type="number" inputMode="numeric" value={jan} onChange={e=>setJan(e.target.value)} placeholder="例: 4580095400000" />
        <label style={S.label}>期首在庫（導入時点の在庫数・任意）</label>
        <input style={S.input} type="number" inputMode="numeric" min="0" value={opening} onChange={e=>setOpening(e.target.value)} placeholder="0" />
        <label style={S.label}>メーカー発注単位(MOQ)・任意 ／ FTCシリーズは1000</label>
        <input style={S.input} type="number" inputMode="numeric" min="0" value={moq} onChange={e=>setMoq(e.target.value)} placeholder="例: 1000" />
        {msg && <div style={msg.e?S.err:S.ok}>{msg.t}</div>}
        <button style={S.primaryBtn} onClick={submit}>商品を登録する</button>
      </div>
      {added.length>0 && (
        <div style={S.card}>
          <div style={S.cardTitle}>今回追加した商品</div>
          {added.map((p,i)=>(<div key={i} style={S.recentRow}><span style={S.recentName}>{p.name}</span><span style={S.recentQty}>{p.code}</span></div>))}
        </div>
      )}
    </div>
  );
}

function Header({ me, title }) {
  const logout = () => api("/api/logout",{method:"POST"}).then(()=>location.reload());
  return (
    <div style={S.header}>
      <div><div style={S.brandSm}>FELICROSS ／ セグロット在庫</div><div style={S.pageTitle}>{title}</div></div>
      <div style={S.userBox}><span style={S.userName}>{me.user}</span><button style={S.logoutBtn} onClick={logout}>ログアウト</button></div>
    </div>
  );
}

function App() {
  const [me,setMe]=useState(null); const [checked,setChecked]=useState(false);
  const [tab,setTab]=useState(null);
  useEffect(()=>{ api("/api/me").then(setMe).catch(()=>setMe(null)).finally(()=>setChecked(true)); },[]);
  if(!checked) return <div style={S.page}><div style={S.muted}>読み込み中…</div></div>;
  if(!me) return <Login onLogin={setMe} />;
  // writer(セグロット)=入力/FBA発送報告 / viewer(フェリクロス)=確認のみ / admin=すべて
  // 在庫確認・入出庫履歴はどのロールでも閲覧可能。入力系のタブのみ書き込み権限で制限する。
  const canWrite = me.role==="writer"||me.role==="admin";
  const isAdmin = me.role==="admin";
  const effTab = tab || (canWrite ? "input" : "stock");
  return (
    <div>
      <div style={S.tabBar}>
        {canWrite && <button style={effTab==="input"?S.tabActive:S.tab} onClick={()=>setTab("input")}>入出庫入力</button>}
        {canWrite && <button style={effTab==="fba"?S.tabActive:S.tab} onClick={()=>setTab("fba")}>FBA発送報告</button>}
        <button style={effTab==="stock"?S.tabActive:S.tab} onClick={()=>setTab("stock")}>在庫確認</button>
        <button style={effTab==="history"?S.tabActive:S.tab} onClick={()=>setTab("history")}>入出庫履歴</button>
        {isAdmin && <button style={effTab==="add"?S.tabActive:S.tab} onClick={()=>setTab("add")}>商品追加</button>}
      </div>
      {effTab==="add" && isAdmin ? <ProductAddView me={me}/>
        : effTab==="fba" && canWrite ? <FbaShipmentView me={me}/>
        : effTab==="input" && canWrite ? <InputView me={me}/>
        : effTab==="history" ? <HistoryView me={me}/>
        : <StockView me={me}/>}
    </div>
  );
}
